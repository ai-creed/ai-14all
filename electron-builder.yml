appId: dev.ai14all.desktop
productName: ai-14all
afterPack: ./scripts/electron-builder-after-pack.mjs
# Compile native deps (better-sqlite3, node-pty) from source against Electron's
# headers. Under Node 24, electron-builder's prebuilt-based rebuild fetches a
# host-ABI (137) better-sqlite3 instead of Electron's 145, which the afterPack
# guard rejects. Building from source guarantees the correct Electron ABI.
buildDependenciesFromSource: true
directories:
  output: release
files:
  - out/**
  - package.json
  # node-pty is N-API: ship only its committed, ABI-portable prebuilds/darwin-<arch>/
  # and DROP the from-source build artifacts. `bin/darwin-<host>-<abi>/node-pty.node`
  # is a stray host-arch copy node-pty never loads (its loader checks build/ then
  # prebuilds/, never bin/) and is byte-identical across the x64+arm64 universal
  # sub-builds, which @electron/universal rejects as an identical Mach-O; `build/` is
  # the rebuilt output whose per-arch intermediates also break the merge. Excluding
  # both makes node-pty load the committed prebuilds (present + correct per arch).
  - "!node_modules/node-pty/bin/**"
  - "!node_modules/node-pty/build/**"
extraResources:
  - from: assets/agent-skills
    to: assets/agent-skills
    filter:
      - "**/*"
      - "!*/evals${/*}"
asarUnpack:
  - node_modules/node-pty/**
mac:
  icon: assets/ai-14all-icon.icns
  hardenedRuntime: true
  gatekeeperAssess: false
  notarize: true
  entitlements: build/entitlements.mac.plist
  entitlementsInherit: build/entitlements.mac.plist
  # The committed node-pty prebuilds (prebuilds/darwin-{x64,arm64}/{pty.node,
  # spawn-helper}) are byte-identical across the two universal sub-builds, so
  # @electron/universal would reject them as identical Mach-O. Allowlist them: they
  # are intentionally per-arch-thin and node-pty picks the right darwin-<arch> dir
  # by process.arch at runtime, so no lipo-merge is wanted (or possible).
  x64ArchFiles: "**/node-pty/prebuilds/**"
  target:
    - target: zip
      arch:
        - arm64
        - universal
    - target: dmg
      arch:
        - arm64
        - universal
win:
  # Phase 2: NSIS installer (per-user, one-click) + portable zip fallback, both
  # unsigned. No explicit arch — overridden per build by the CLI flag
  # (--arm64 / --x64); CI builds each arch on its native runner.
  target:
    - target: nsis
    - target: zip
  # icon still omitted — Electron's default icon is used (signing + icon deferred).
nsis:
  oneClick: true
  perMachine: false
  # Explicit artifactName so the x64 installer is `ai-14all-<ver>-x64-Setup.exe`
  # (matches the uploaded release asset name). electron-builder's NSIS default is
  # `${productName} Setup ${version}.${ext}` -> `ai-14all Setup 0.9.3.exe`, whose
  # space and missing arch segment are URL-awkward and collide across arches in a
  # single Release. A custom name is safe for electron-updater: the client
  # resolves the installer + `.blockmap` names from `latest.yml`, which
  # electron-builder writes to match whatever artifactName produced (it also
  # auto-names the blockmap `<installer>.blockmap`).
  artifactName: ${name}-${version}-${arch}-Setup.${ext}
publish:
  provider: github
  owner: ai-creed
  repo: ai-14all
