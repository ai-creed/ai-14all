appId: dev.ai14all.desktop
productName: ai-14all
afterPack: ./scripts/electron-builder-after-pack.mjs
# Compile native deps (better-sqlite3, node-pty) from source against Electron's
# headers. Under Node 24, electron-builder's prebuilt-based rebuild fetches a
# host-ABI (137) better-sqlite3 instead of Electron's 145, which the afterPack
# guard rejects. Building from source guarantees the correct Electron ABI.
buildDependenciesFromSource: true
directories:
  output: release
files:
  - out/**
  - package.json
extraResources:
  - assets/agent-skills/**/*
asarUnpack:
  - node_modules/node-pty/**
mac:
  icon: assets/ai-14all-icon.icns
  hardenedRuntime: true
  gatekeeperAssess: false
  notarize: true
  entitlements: build/entitlements.mac.plist
  entitlementsInherit: build/entitlements.mac.plist
  target:
    - target: zip
      arch:
        - arm64
    - target: dmg
      arch:
        - arm64
win:
  # Phase 1: portable zip only (no NSIS installer, no signing). arm64-only.
  target:
    - target: zip
      arch:
        - arm64
  # icon omitted in Phase 1 — Electron's default icon is used.
publish:
  provider: github
  owner: ai-creed
  repo: ai-14all
