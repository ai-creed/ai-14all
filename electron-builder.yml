appId: dev.ai14all.desktop
productName: ai-14all
afterPack: ./scripts/electron-builder-after-pack.mjs
directories:
  output: release
files:
  - out/**
  - package.json
extraResources:
  - assets/agent-skills/**/*
asarUnpack:
  - node_modules/node-pty/**
mac:
  icon: assets/ai-14all-icon.icns
  hardenedRuntime: true
  gatekeeperAssess: false
  notarize: true
  entitlements: build/entitlements.mac.plist
  entitlementsInherit: build/entitlements.mac.plist
  target:
    - target: zip
      arch:
        - arm64
    - target: dmg
      arch:
        - arm64
publish:
  provider: github
  owner: ai-creed
  repo: ai-14all
