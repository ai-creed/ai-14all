name: release

on:
  push:
    tags:
      - "v*.*.*"
      - "!v*-*"
  workflow_dispatch:
    inputs:
      ref:
        description: "Tag or branch to release from"
        required: true
      version:
        description: "Override version (required for smoke runs with no tag)"
        required: false

jobs:
  release:
    runs-on: macos-14
    timeout-minutes: 45
    permissions:
      contents: write
    steps:
      - name: Resolve version
        id: resolve
        shell: bash
        run: |
          if [ -n "${{ inputs.version }}" ]; then
            echo "version=${{ inputs.version }}" >> "$GITHUB_OUTPUT"
          else
            tag="${GITHUB_REF_NAME}"
            echo "version=${tag#v}" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout at ref
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref || github.ref }}

      - name: Setup Node + pnpm
        uses: actions/setup-node@v4
        with:
          # Node 24 to match Electron 41's bundled Node (24.x) and to provide a
          # stable `node:sqlite` — the cortex fixture helper imports DatabaseSync,
          # which is experimental/flagged on Node 22 and breaks Vite's externalize.
          node-version: "24"
      - run: corepack enable
      - run: pnpm install --frozen-lockfile

      # electron@41's bundled extract-zip leaves Electron.app incomplete under
      # Node 24 (missing Contents/Frameworks + path.txt), so playwright's
      # _electron.launch in the E2E step fails with a dyld "Electron Framework"
      # error. Re-extract the cached zip with macOS `ditto` and write path.txt.
      - name: Ensure Electron binary is fully installed
        run: node scripts/ensure-electron.mjs

      - name: Lint + format + typecheck
        run: |
          pnpm lint
          pnpm format
          pnpm typecheck

      - name: Unit tests
        run: pnpm test

      - name: E2E tests
        run: pnpm test:e2e

      # The E2E step's posttest rebuilds better-sqlite3 for host Node (so unit
      # tests keep working), leaving it at the host ABI. electron-builder's
      # internal @electron/rebuild then sees a cache hit and SKIPS rebuilding, so
      # it would package the host-ABI binary — which the afterPack guard rejects
      # (NODE_MODULE_VERSION 137 vs Electron's 145). Force the Electron rebuild
      # here so the packaged better-sqlite3 matches Electron's ABI. For the
      # universal target, electron-builder's buildDependenciesFromSource rebuilds
      # better-sqlite3 from source for BOTH the arm64 and x64 sub-builds (the
      # macos-14 Xcode toolchain cross-compiles the x64 slice); the slice gate
      # below is the safety net that fails the build if either arch is wrong.
      - name: Rebuild better-sqlite3 for Electron before packaging
        run: pnpm exec electron-rebuild -f -w better-sqlite3

      - name: Align package.json version with target
        shell: bash
        run: |
          target="${{ steps.resolve.outputs.version }}"
          current=$(node -p "require('./package.json').version")
          if [ "${{ github.event_name }}" = "push" ] && [ "$current" != "$target" ]; then
            echo "tag points at commit whose package.json is $current, expected $target"
            exit 1
          fi
          node -e "const fs=require('fs');const p=require('./package.json');p.version='${target}';fs.writeFileSync('package.json', JSON.stringify(p, null, '\t')+'\n');"

      - name: Package DMG + ZIP + manifest (signed + notarized)
        shell: bash
        env:
          CSC_LINK: ${{ secrets.MAC_CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.MAC_CSC_KEY_PASSWORD }}
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_API_KEY_P8: ${{ secrets.APPLE_API_KEY_P8 }}
        run: |
          KEYFILE="$RUNNER_TEMP/AuthKey.p8"
          printf '%s' "$APPLE_API_KEY_P8" > "$KEYFILE"
          export APPLE_API_KEY="$KEYFILE"
          pnpm package:mac

      - name: Assert universal + arm64 CPU slices
        shell: bash
        run: node scripts/ci/assert-universal-slices.mjs release ai-14all

      - name: Sign + notarize + staple DMG
        shell: bash
        env:
          MAC_CSC_LINK: ${{ secrets.MAC_CSC_LINK }}
          MAC_CSC_KEY_PASSWORD: ${{ secrets.MAC_CSC_KEY_PASSWORD }}
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_API_KEY_P8: ${{ secrets.APPLE_API_KEY_P8 }}
        run: |
          # electron-builder signs/notarizes the .app but not the DMG container.
          # Import the Developer ID cert into a keychain so codesign can find the
          # identity, then sign + notarize + staple the DMG.
          KEYCHAIN="$RUNNER_TEMP/dmg-signing.keychain-db"
          security create-keychain -p "" "$KEYCHAIN"
          security set-keychain-settings -lut 21600 "$KEYCHAIN"
          security unlock-keychain -p "" "$KEYCHAIN"
          echo "$MAC_CSC_LINK" | base64 --decode > "$RUNNER_TEMP/cert.p12"
          security import "$RUNNER_TEMP/cert.p12" -k "$KEYCHAIN" \
            -P "$MAC_CSC_KEY_PASSWORD" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple: -s -k "" "$KEYCHAIN"
          # Put our keychain at the front of the user search list so
          # `security find-identity` (used by the script) sees the identity.
          security list-keychains -d user -s "$KEYCHAIN" \
            $(security list-keychains -d user | sed -e 's/["[:space:]]//g')

          KEYFILE="$RUNNER_TEMP/AuthKey.p8"
          printf '%s' "$APPLE_API_KEY_P8" > "$KEYFILE"
          export APPLE_API_KEY="$KEYFILE"
          node scripts/sign-notarize-dmg.mjs

      - name: Verify signature & notarization
        shell: bash
        run: |
          mapfile -t APPS < <(find release -maxdepth 2 -name '*.app')
          if [ "${#APPS[@]}" -eq 0 ]; then echo "no .app found in release/"; exit 1; fi
          for APP in "${APPS[@]}"; do
            echo "Verifying app: $APP"
            codesign --verify --deep --strict --verbose=2 "$APP"
            spctl --assess --type execute --verbose=2 "$APP"
          done

          mapfile -t DMGS < <(find release -maxdepth 1 -name '*.dmg')
          if [ "${#DMGS[@]}" -eq 0 ]; then echo "no .dmg found in release/"; exit 1; fi
          for DMG in "${DMGS[@]}"; do
            echo "Verifying dmg: $DMG"
            codesign --verify --verbose=2 "$DMG"
            spctl --assess --type install --verbose=2 "$DMG"
          done

      - name: Pre-rewrite validation
        shell: bash
        run: |
          target="${{ steps.resolve.outputs.version }}"
          node -e "
            const y=require('js-yaml');
            const m=y.load(require('fs').readFileSync('release/latest-mac.yml','utf8'));
            if(m.version!=='${target}'){throw new Error('emitted version '+m.version+' != target ${target}');}
            if(!m.sha512){throw new Error('top-level sha512 is empty');}
            m.files.forEach((f,i)=>{if(!f.sha512)throw new Error('files['+i+'].sha512 is empty');});
          "

      - name: Rewrite manifest to published form
        shell: bash
        run: |
          target="${{ steps.resolve.outputs.version }}"
          pnpm exec tsx scripts/rewrite-manifest.ts \
            release/latest-mac.yml release/latest-mac.published.yml "$target"

      - name: Post-rewrite validation
        shell: bash
        run: |
          grep -q "https://github.com/ai-creed/ai-14all/releases/download/v${{ steps.resolve.outputs.version }}/" release/latest-mac.published.yml

      - name: Publish manifest to ai-creed
        shell: bash
        env:
          DEPLOY_KEY: ${{ secrets.AI_CREED_DEPLOY_KEY }}
        run: |
          mkdir -p ~/.ssh
          echo "$DEPLOY_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan github.com >> ~/.ssh/known_hosts
          git config --global user.email "release-bot@ai-creed.dev"
          git config --global user.name "ai-creed release bot"
          git clone git@github.com:ai-creed/ai-creed.git "$RUNNER_TEMP/ai-creed"
          cd "$RUNNER_TEMP/ai-creed"
          git pull --rebase origin master
          cp "$GITHUB_WORKSPACE/release/latest-mac.published.yml" "$RUNNER_TEMP/ai-creed/public/ai-14all/latest-mac.yml"
          target="${{ steps.resolve.outputs.version }}"
          mdx="src/content/projects/ai-14all.mdx"
          # Idempotently expose the universal dmg as the default macOS download
          # (arm64 becomes the secondary "native" link) and drop the stale
          # "no Intel macOS" copy. Runs BEFORE the version-bump sed so this first
          # universal release atomically updates the page when the universal dmg
          # becomes downloadable; a no-op on releases where it is already applied.
          node "$GITHUB_WORKSPACE/scripts/ci/ensure-ai-creed-universal-download.mjs" "$mdx"
          sed -i.bak -E \
            -e "s|ai-14all-[0-9]+\.[0-9]+\.[0-9]+-universal\.dmg|ai-14all-${target}-universal.dmg|g" \
            -e "s|ai-14all-[0-9]+\.[0-9]+\.[0-9]+-arm64\.dmg|ai-14all-${target}-arm64.dmg|g" \
            -e "s|ai-14all-[0-9]+\.[0-9]+\.[0-9]+-x64-Setup\.exe|ai-14all-${target}-x64-Setup.exe|g" \
            -e "s|releases/download/v[0-9]+\.[0-9]+\.[0-9]+/|releases/download/v${target}/|g" \
            -e "s|\*\*v[0-9]+\.[0-9]+\.[0-9]+\*\*|**v${target}**|g" \
            "$mdx"
          rm "$mdx.bak"
          git add public/ai-14all/latest-mac.yml "$mdx"
          git commit -m "chore(releases): ai-14all v${{ steps.resolve.outputs.version }}"
          git push origin master

      - name: Create or refresh GitHub Release
        if: github.event_name == 'push'
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          tag="v${{ steps.resolve.outputs.version }}"
          if gh release view "$tag" >/dev/null 2>&1; then
            gh release upload "$tag" release/*.dmg release/*.zip release/latest-mac.yml --clobber
          else
            gh release create "$tag" release/*.dmg release/*.zip release/latest-mac.yml \
              --title "$tag" \
              --notes "See CHANGELOG.md for release notes."
          fi
