name: build-windows

# Branch CI for the UNSIGNED Windows build. Each arch builds on its own native
# runner because better-sqlite3 + node-pty are compiled from source
# (buildDependenciesFromSource) and cross-arch native builds are flaky. No
# signing, no publish (electron-builder runs with --publish never; artifacts are
# uploaded only as workflow artifacts, never to a GitHub Release — CI/CD owns
# publish on tag push via release-windows.yml).
#
# x64 additionally builds the NSIS installer and runs the shared Windows-native
# acceptance gate (verify asset set + silent install/launch smoke), and uploads
# the installer as a downloadable artifact. This makes the spec §5 Windows
# acceptance criteria verifiable on every push to master (and via manual
# dispatch), separate from release-windows.yml, which only triggers on a release
# tag to publish to a GitHub Release. arm64 builds the zip only.
#
# Local equivalent: on a Windows machine, `pnpm install` then `pnpm package:win`.
#
# Separate from release.yml; does not touch the macOS release pipeline.

on:
  workflow_dispatch:
  push:
    branches:
      - master

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: windows-11-arm
            arch: arm64
            ebTargets: zip
          - runner: windows-latest
            arch: x64
            ebTargets: nsis zip
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 45
    defaults:
      run:
        shell: pwsh
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node (24, matches Electron 41's bundled Node)
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Enable corepack (pnpm)
        run: corepack enable

      - name: Setup Python (node-gyp)
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # buildDependenciesFromSource rebuilds native deps against Electron's
      # headers during packaging, but force the better-sqlite3 Electron-ABI
      # rebuild here too so the afterPack ABI guard cannot reject a stale binary.
      - name: Rebuild better-sqlite3 for Electron (${{ matrix.arch }})
        run: pnpm exec electron-rebuild -f -w better-sqlite3 --arch ${{ matrix.arch }}

      - name: Build + package win-${{ matrix.arch }} (unsigned, no publish)
        run: |
          pnpm build
          pnpm exec electron-builder --win ${{ matrix.ebTargets }} --${{ matrix.arch }} --publish never

      # x64 Windows-native acceptance gate (verify the NSIS asset set + latest.yml
      # reference, then silent install + launch smoke). Shared verbatim with
      # release-windows.yml. Version comes from package.json (artifactName uses
      # ${version}).
      - name: Acceptance gate — verify x64 artifacts + silent install/launch smoke
        if: matrix.arch == 'x64'
        run: |
          $ver = node -p "require('./package.json').version"
          pwsh -File scripts/ci/windows-x64-acceptance.ps1 -Version $ver

      - name: Upload win-${{ matrix.arch }} artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ai-14all-win-${{ matrix.arch }}
          path: |
            release/*-Setup.exe
            release/*-Setup.exe.blockmap
            release/latest.yml
            release/*.zip
          if-no-files-found: warn
