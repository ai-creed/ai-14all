<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<!-- Brand mark favicon: dark-ink on light browser chrome, light-ink on dark. -->
		<link
			rel="icon"
			type="image/png"
			href="/assets/ai-14all-mark-dark.png"
			media="(prefers-color-scheme: light)"
		/>
		<link
			rel="icon"
			type="image/png"
			href="/assets/ai-14all-mark-light.png"
			media="(prefers-color-scheme: dark)"
		/>
		<title>ai-14all</title>
		<style>
			/*
			 * Startup splash: rendered before the main bundle parses so the user
			 * sees something instead of an empty viewport. The .app-splash node
			 * sits inside #root so React's first render automatically replaces
			 * it on mount, but html/body themselves are outside #root and are
			 * never "replaced" — so their splash background is scoped with
			 * :has(.app-splash) to stop competing with the app's own themed
			 * body background (src/styles/base.css) once the splash is gone.
			 */
			html,
			body {
				margin: 0;
			}
			html:has(.app-splash),
			body:has(.app-splash) {
				background: #0b1116;
			}
			.app-splash {
				position: fixed;
				inset: 0;
				display: flex;
				align-items: center;
				justify-content: center;
				background: #0b1116;
				color: #eef7fa;
				font-family:
					-apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, ui-sans-serif,
					system-ui, sans-serif;
				z-index: 9999;
			}
			.app-splash__inner {
				display: flex;
				flex-direction: column;
				align-items: center;
				gap: 14px;
				width: 280px;
			}
			/* Brand mark — light-ink variant for the dark splash (swapped below
			   for light mode). */
			.app-splash__logo {
				width: 72px;
				height: 72px;
				background: center / contain no-repeat
					url("/assets/ai-14all-mark-light.png");
			}
			.app-splash__title {
				font-size: 13px;
				letter-spacing: 0.02em;
				color: #6f8593;
			}
			.app-splash__bar {
				position: relative;
				width: 100%;
				height: 3px;
				background: #16232c;
				border-radius: 2px;
				overflow: hidden;
			}
			.app-splash__bar-fill {
				position: absolute;
				top: 0;
				left: 0;
				width: 30%;
				height: 100%;
				background: linear-gradient(
					90deg,
					rgba(103, 212, 176, 0),
					#67d4b0,
					rgba(103, 212, 176, 0)
				);
				animation: app-splash-slide 1.4s ease-in-out infinite;
			}
			@keyframes app-splash-slide {
				from {
					transform: translateX(-100%);
				}
				to {
					transform: translateX(400%);
				}
			}
			@media (prefers-color-scheme: light) {
				html:has(.app-splash),
				body:has(.app-splash),
				.app-splash {
					background: #f0f2f5;
				}
				.app-splash {
					color: #1e2530;
				}
				.app-splash__title {
					color: #7a8a9a;
				}
				.app-splash__logo {
					background-image: url("/assets/ai-14all-mark-dark.png");
				}
				.app-splash__bar {
					background: #e2e6eb;
				}
				.app-splash__bar-fill {
					background: linear-gradient(
						90deg,
						rgba(26, 127, 193, 0),
						#1a7fc1,
						rgba(26, 127, 193, 0)
					);
				}
			}
		</style>
	</head>
	<body>
		<div id="root">
			<div class="app-splash" role="status" aria-live="polite">
				<div class="app-splash__inner">
					<div class="app-splash__logo" aria-hidden="true"></div>
					<div class="app-splash__title">Initializing, ready soon</div>
					<div class="app-splash__bar">
						<div class="app-splash__bar-fill"></div>
					</div>
				</div>
			</div>
		</div>
		<script type="module" src="/src/main.tsx"></script>
	</body>
</html>
